<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worker Agent v4.0 — 右侧Chat抽屉 + 类VSCode分屏 + 运行监控</title>
<style>
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#181824;--bg4:#1e1e2e;--bg5:#252538;
  --tx:#cdd6f4;--tx2:#a6adc8;--txm:#585b70;
  --brd:#313244;--brd2:#45475a;
  --ac:#7c3aed;--aca:#6d28d9;--acs:rgba(124,558,237,.12);
  --ok:#34d399;--wr:#fbbf24;--er:#f87171;--inf:#60a5fa;
  --pd:#f472b6;--te:#2dd4bf;--sk:#818cf8;
  --r:10px;--rs:6px;--shadow:0 4px 24px rgba(0,0,0,.4);
  --split-size:4px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;overflow:hidden;font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px;color:var(--tx);background:var(--bg)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}::-webkit-scrollbar-track{background:transparent}
.app{display:flex;flex-direction:column;height:100vh;width:100vw;overflow:hidden}
body{width:100vw}

/* TOP BAR */
.tb{display:flex;align-items:center;height:40px;padding:0 12px;gap:10px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0}
.tb-logo{font-size:15px;font-weight:700;color:var(--ac);letter-spacing:-.5px;display:flex;align-items:center;gap:6px;user-select:none}
.tb-logo span{font-size:10px;color:var(--txm);font-weight:500;background:var(--acs);padding:1px 6px;border-radius:3px}
.tb-search{flex:1;max-width:480px;margin:0 auto;position:relative}
.tb-search input{width:100%;padding:7px 12px 7px 34px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);color:var(--tx);font-size:12.5px;outline:none;transition:all .15s}
.tb-search input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(124,558,237,.12)}
.tb-search input::placeholder{color:var(--txm)}
.tb-search .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--txm);font-size:13px;pointer-events:none}
.tb-search .s-hint{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--txm);background:var(--bg4);padding:2px 6px;border-radius:3px;border:1px solid var(--brd)}
.tb-right{display:flex;align-items:center;gap:14px}
.tb-stat{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2);font-weight:500}
.tb-stat .dot-3{width:8px;height:8px;border-radius:50%;background:var(--ok)}
.tb-stat .dot-w{width:8px;height:8px;border-radius:50%;background:var(--wr)}
.tb-time{font-size:11px;color:var(--tx2);font-variant-numeric:tabular-nums}

/* MAIN AREA */
.ma{display:flex;flex:1;overflow:hidden}

/* ===== ICON NAV ===== */
.inev{width:52px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:6px 0;flex-shrink:0}
.inev-btn{width:40px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--rs);cursor:pointer;color:var(--txm);transition:all .12s;position:relative;border:none;background:transparent;font-size:16px;margin:1px 4px}
.inev-btn:hover{background:var(--bg4);color:var(--tx)}
.inev-btn.active{background:var(--acs);color:var(--ac)}
.inev-btn.active::before{content:'';position:absolute;left:-1px;top:6px;bottom:6px;width:2.5px;background:var(--ac);border-radius:0 2px 2px 0}
.inev-btn .tip{display:none;position:absolute;left:52px;top:50%;transform:translateY(-50%);background:var(--bg4);color:var(--tx);padding:5px 12px;border-radius:5px;font-size:11.5px;font-weight:500;white-space:nowrap;box-shadow:var(--shadow);border:1px solid var(--brd);z-index:999;pointer-events:none}
.inev-btn:hover .tip{display:block}
.inev-sp{flex:1}.inev-sep{height:1px;background:var(--brd);margin:4px 8px}

/* ===== SPLIT CONTAINER ===== */
.split-container{display:flex;flex:1;overflow:hidden;position:relative}
.split-container.horizontal{flex-direction:row}
.split-container.vertical{flex-direction:column}
.split-pane{overflow:hidden;display:flex;flex-direction:column;position:relative;min-width:0;min-height:0}

/* Split Handle */
.split-handle{
  flex-shrink:0;background:var(--brd);cursor:col-resize;transition:background .15s;position:relative;z-index:10;
  display:flex;align-items:center;justify-content:center;
}
.split-handle.vertical{width:var(--split-size);height:100%}
.split-handle.horizontal{height:var(--split-size);width:100%}
.split-handle:hover,.split-handle.dragging{background:var(--ac)}
.split-handle::after{
  content:'';width:2px;background:rgba(255,255,255,.3);border-radius:1px;transition:width .15s;opacity:0;
}
.split-handle:hover::after,.split-handle.dragging::after{width:4px;opacity:1}

/* Snap Guides */
.snap-guide{
  position:absolute;z-index:50;pointer-events:none;
}
.snap-guide.vertical{
  width:2px;background:var(--ac);top:0;bottom:0;left:0;opacity:0;transition:opacity .1s;
}
.snap-guide.vertical.active{opacity:.6}

/* ===== TAB BAR ===== */
.tab-bar{
  display:flex;height:32px;padding:0 2px;background:var(--bg2);border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto;
}
.tab-bar::-webkit-scrollbar{height:3px}
.tab-bar::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.tab-item{
  padding:0 14px;height:32px;display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--txm);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;background:transparent;border:none;font-family:inherit;flex-shrink:0;min-width:40px;
}
.tab-item:hover{color:var(--tx);background:var(--bg3)}
.tab-item.active{color:var(--ac);background:var(--bg3);border-bottom-color:var(--ac)}
.tab-item .tab-close{
  width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px;font-size:10px;opacity:0;transition:all .12s;
}
.tab-item:hover .tab-close{opacity:.7}
.tab-item .tab-close:hover{opacity:1;background:var(--bg4)}

/* ===== LEFT PANEL ===== */
.lp{width:264px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.lp-header{display:flex;align-items:center;height:34px;padding:0 10px;border-bottom:1px solid var(--brd);background:var(--bg2)}
.lp-title{flex:1;font-size:11.5px;font-weight:600;color:var(--tx2)}
.lsub{display:flex;height:28px;padding:0 8px;gap:2px;border-bottom:1px solid var(--brd)}
.lsub-btn{padding:4px 10px;font-size:11px;color:var(--txm);cursor:pointer;border-radius:4px;transition:all .12s;border:none;background:transparent;font-weight:500;font-family:inherit}
.lsub-btn:hover{color:var(--tx);background:var(--bg4)}
.lsub-btn.active{color:var(--ac);background:var(--acs)}
.lp-content{flex:1;overflow-y:auto;padding:4px 6px}
.lp-content .section-title{font-size:10px;color:var(--txm);font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:8px 8px 4px}

/* Agent list */
.a-item{padding:10px 12px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg3);margin:3px 0;cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:10px}
.a-item:hover{background:var(--bg4);border-color:var(--brd2)}
.a-item.active{border-color:var(--ac);background:rgba(124,558,237,.08)}
.a-icon{font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--acs);border-radius:var(--rs);flex-shrink:0}
.a-info{flex:1;overflow:hidden}
.a-name{font-size:12.5px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px}
.a-status{font-size:9.5px;padding:1px 5px;border-radius:3px;font-weight:600}
.a-status.online{background:rgba(52,211,153,.15);color:var(--ok)}.a-status.idle{background:rgba(251,191,36,.15);color:var(--wr)}.a-status.busy{background:rgba(248,113,113,.15);color:var(--er)}
.a-desc{font-size:10.5px;color:var(--tx2);line-height:1.4}
.a-model{font-size:10px;margin-top:3px;color:var(--txm)}

/* Monitor card */
.m-card{padding:12px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg3);margin:3px 0}
.m-card .mc-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.m-card .mc-title{font-size:12px;font-weight:600}
.m-card .mc-badge{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
.m-card .mc-badge.ok{background:rgba(52,211,153,.15);color:var(--ok)}.m-card .mc-badge.w{background:rgba(251,191,36,.15);color:var(--wr)}.m-card .mc-badge.b{background:rgba(124,58,237,.15);color:var(--ac)}
.m-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.m-stat{background:var(--bg);padding:6px;border-radius:var(--rs);text-align:center}
.m-stat .ms-val{font-size:14px;font-weight:700}
.m-stat .ms-label{font-size:9px;color:var(--txm);margin-top:2px}
.m-stat .ms-val.ok{color:var(--ok)}.m-stat .ms-val.wr{color:var(--wr)}.m-stat .ms-val.er{color:var(--er)}

/* Knowledge items */
.k-item{padding:8px 10px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg3);margin:3px 0;display:flex;align-items:center;gap:8px;cursor:pointer}
.k-item:hover{background:var(--bg4)}
.k-icon{font-size:16px;width:24px;text-align:center}
.k-count{font-size:10px;color:var(--txm);background:var(--bg);padding:1px 5px;border-radius:2px}

/* Remote */
.rm-card{padding:12px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg3);margin:3px 0;display:flex;align-items:center;gap:10px}
.rm-card:hover{border-color:var(--brd2)}
.rm-icon{font-size:18px}
.rm-info{flex:1}
.rm-name{font-size:12px;font-weight:600;margin-bottom:2px}
.rm-desc{font-size:10.5px;color:var(--tx2)}
.rm-switch{width:32px;height:18px;background:var(--bg);border:1px solid var(--brd);border-radius:9px;cursor:pointer;position:relative;transition:all .15s;flex-shrink:0}
.rm-switch.on{background:var(--ac);border-color:var(--ac)}
.rm-switch::after{content:'';width:12px;height:12px;background:white;border-radius:50%;position:absolute;top:2px;left:2px;transition:all .15s}
.rm-switch.on::after{left:17px}

/* Workspace */
.ws-card{padding:12px;border-radius:var(--rs);border:1px solid var(--brd);background:var(--bg3);margin:3px 0;cursor:pointer}
.ws-card:hover{background:var(--bg4)}
.ws-name{font-size:12px;font-weight:600;margin-bottom:2px}
.ws-desc{font-size:10.5px;color:var(--tx2);margin-bottom:6px}
.ws-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.ws-fill{height:100%;background:var(--ac);border-radius:2px}
.ws-meta{display:flex;gap:10px;margin-top:4px}
.ws-meta span{font-size:10px;color:var(--txm)}

/* ===== MAIN CONTENT (center panel) ===== */
.content-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.content-page{flex:1;display:none;flex-direction:column;overflow:hidden}
.content-page.active{display:flex}
.ch{display:flex;align-items:center;height:36px;padding:0 12px;border-bottom:1px solid var(--brd);background:var(--bg2);flex-shrink:0}
.ch-text{font-size:12px;font-weight:600}

/* Agent detail / monitoring */
.monitor-body{flex:1;overflow-y:auto;padding:16px}
.monitor-header{display:flex;align-items:center;gap:12px;padding:16px 16px 12px;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);margin-bottom:12px}
.monitor-header .mh-icon{font-size:28px}
.monitor-header .mh-info{flex:1}
.monitor-header .mh-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.monitor-header .mh-desc{font-size:11px;color:var(--tx2)}
.monitor-header .mh-status{display:flex;align-items:center;gap:4px;font-size:11px;font-weight:600}
.monitor-header .mh-status .dot{width:8px;height:8px;border-radius:50%;animation:blink 1s infinite}
.monitor-header .mh-status .dot.ok{background:var(--ok)}.monitor-header .mh-status .dot.wr{background:var(--wr)}
@keyframes blink{0%,100%{opacity:.5}50%{opacity:1}}

.timeline{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--r);padding:12px}
.timeline-title{font-size:11px;font-weight:600;color:var(--tx2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.timeline-item{display:flex;gap:8px;padding:6px 0;position:relative}
.timeline-item:not(:last-child)::after{content:'';position:absolute;left:12px;top:28px;bottom:6px;width:2px;background:var(--brd)}
.timeline-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px}
.timeline-dot.ok{background:var(--ok)}.timeline-dot.wr{background:var(--wr)}.timeline-dot.ac{background:var(--ac);border:2px solid var(--acs)}
.timeline-content{flex:1}
.timeline-time{font-size:10px;color:var(--txm);font-variant-numeric:tabular-nums}
.timeline-desc{font-size:11px;margin-top:1px}
.timeline-progress{margin-top:4px}
.timeline-progress .tp-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.timeline-progress .tp-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--pf));border-radius:3px;transition:width .5s}
.timeline-progress .tp-label{font-size:10px;color:var(--txm);margin-top:2px}

.resource-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.resource-card{background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:10px;text-align:center}
.resource-card .rv{font-size:16px;font-weight:700}
.resource-card .rl{font-size:9px;color:var(--txm);margin-top:2px}
.resource-card .rv.ok{color:var(--ok)}.resource-card .rv.wr{color:var(--wr)}.resource-card .rv.er{color:var(--er)}.resource-card .rv.ac{color:var(--ac)}

/* Session list */
.s-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--rs);cursor:pointer;margin:1px 0;transition:all .12s}
.s-item:hover{background:var(--bg4)}
.s-item.active{background:var(--acs)}
.s-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-dot.ok{background:var(--ok)}.s-dot.w{background:var(--wr)}.s-dot.x{background:var(--er)}
.s-info{flex:1;overflow:hidden}
.s-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-time{font-size:10px;color:var(--txm)}

/* ===== CHAT DRAWER (right side) ===== */
.chat-drawer{
  width:5px;background:var(--brd);border-right:1px solid var(--brd2);flex-shrink:0;
  position:relative;padding:0;overflow:hidden;cursor:col-resize;
  transition:min-width .3s cubic-bezier(0.4,0,0.2,1);min-width:5px;max-width:calc(100% - 60px);
}
.chat-drawer.state-minimized{min-width:380px}
.chat-drawer.state-expanded{min-width:50%}

/* Resize handle on left edge of drawer */
.resize-handle{
  position:absolute;left:0;top:0;bottom:0;width:8px;cursor:col-resize;z-index:20;
  border-left:2px solid transparent;transition:all .15s;
}
.resize-handle:hover,.resize-handle.dragging{
  border-left-color:var(--ac);background:rgba(124,58,237,.06);
}

/* Drawer content */
.drawer-content{
  display:none;flex-direction:column;height:100%;width:100%;overflow:hidden;
  background:var(--bg2);
}
.chat-drawer.state-minimized .drawer-content,
.chat-drawer.state-expanded .drawer-content{
  display:flex;
}

/* Drawer header */
.dd-head{display:flex;align-items:center;height:36px;padding:0 10px;border-bottom:1px solid var(--brd);background:var(--bg2);flex-shrink:0;gap:6px}
.dd-title{flex:1;font-size:11.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.dd-title .icon{font-size:13px}

/* Drawer chat body */
.dd-chat{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.dd-msg{display:flex;gap:6px}
.dd-msg.ai .dd-av{background:var(--acs);color:var(--ac)}
.dd-msg.user .dd-av{background:rgba(96,165,250,.12);color:var(--inf)}
.dd-av{width:24px;height:24px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.dd-bubble{flex:1;font-size:11.5px;line-height:1.6;background:var(--bg3);border:1px solid var(--brd);border-radius:var(--rs);padding:6px 8px}
.dd-bubble pre{background:var(--bg);border-radius:3px;padding:6px;margin:4px 0;font-size:10px;font-family:'JetBrains Mono',monospace;overflow-x:auto}

/* Drawer footer */
.dd-foot{padding:8px 10px;border-top:1px solid var(--brd);background:var(--bg2);flex-shrink:0;display:flex;gap:6px}
.dd-input{flex:1;padding:7px 9px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:11.5px;outline:none;font-family:inherit}
.dd-input:focus{border-color:var(--ac)}
.dd-send{padding:7px 12px;background:var(--ac);color:white;border:none;border-radius:var(--rs);cursor:pointer;font-size:11px;font-weight:600}

/* Drawer toggle (5px strip) */
.drawer-toggle{
  position:absolute;right:8px;top:50%;transform:translateY(-50%);width:20px;height:60px;
  background:var(--acs);border:1px solid var(--acf);border-radius:var(--rs);cursor:pointer;
  display:flex;align-items:center;justify-content:center;z-index:10;transition:all .15s
}
.drawer-toggle:hover{background:rgba(124,58,237,.25)}
.drawer-toggle .arrow{font-size:10px;color:var(--ac);transition:transform .2s}
.chat-drawer.state-minimized .drawer-toggle{transform:translateY(-50%) translateX(-8px);opacity:0;pointer-events:none}

/* ===== FLOATING CHAT PANEL (for monitoring context) ===== */
.float-chat{
  position:fixed;bottom:20px;right:calc(500px);width:280px;border-radius:var(--r);
  background:var(--bg2);border:1px solid var(--brd);box-shadow:var(--shadow);z-index:1500;
  display:none;flex-direction:column;transform-origin:bottom right;
  transition:all .3s cubic-bezier(0.4,0,0.2,1);
}
.float-chat.show{display:flex;transform:scale(1);opacity:1}
.float-chat.hide{display:flex;transform:scale(0.5);opacity:0;pointer-events:none}
.fc-head{display:flex;align-items:center;height:34px;padding:0 10px;border-bottom:1px solid var(--brd);gap:6px;background:var(--bg3)}
.fc-title{flex:1;font-size:11px;font-weight:600}
.fc-body{flex:1;overflow-y:auto;padding:10px;max-height:300px}
.fc-foot{padding:8px 10px;border-top:1px solid var(--brd);background:var(--bg3);display:flex;gap:6px}
.fc-input{flex:1;padding:6px 8px;background:var(--bg);border:1px solid var(--brd);border-radius:var(--rs);color:var(--tx);font-size:11px;outline:none}
.fc-send{padding:6px 10px;background:var(--ac);color:white;border:none;border-radius:var(--rs);cursor:pointer;font-size:10px}

/* FAB */
.fab{
  position:fixed;bottom:20px;right:20px;width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--ac),var(--aca));color:white;font-size:20px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 16px rgba(124,58,237,.4);border:none;z-index:1400;transition:all .15s
}
.fab:hover{transform:scale(1.05)}
.fab-badge{position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:var(--er);border-radius:50%;font-size:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700}
.fab-badge.hidden{display:none}

/* Global search */
.global-search{display:none;position:fixed;top:12%;left:50%;transform:translateX(-50%);width:calc(100% - 40px);max-width:560px;background:var(--bg2);border:1px solid var(--brd);border-radius:var(--r);box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:3000;overflow:hidden}
.global-search.active{display:block}
.gs-head{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--brd)}
.gs-input{flex:1;background:transparent;border:none;color:var(--tx);font-size:14px;outline:none}
.gs-input::placeholder{color:var(--txm)}

/* ===== RESIZE OVERLAY ===== */
.resize-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:1900;pointer-events:none;
  cursor:col-resize;
}
.resize-overlay.active{display:block;pointer-events:auto}

/* Anim */
@keyframes slideIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.msg-in{animation:slideIn .2s ease}
.snap-guide{
  position:absolute;z-index:50;pointer-events:none;
}
.snap-guide.vertical{width:2px;background:var(--ac);top:0;bottom:0;opacity:0;transition:opacity .1s}
.snap-guide.vertical.active{opacity:.5}
.snap-guide.horizontal{height:2px;background:var(--ac);left:0;right:0;opacity:0;transition:opacity .1s}
.snap-guide.horizontal.active{opacity:.5}

</style>
</head>
<body>
<div class="app" id="app">

        <div class="content-panel">

<!-- FAB (shown when drawer is folded) -->
<button class="fab show" id="fabBtn" onclick="toggleChatDrawer()">🤖</button>

<!-- GLOBAL SEARCH -->

<script>
// ===== GLOBAL STATE =====
let floatChatState = 'minimized';
let currentSplitRatio = 0.3;
let isDragging = false;

// ===== PAGE DATA =====
const agents = [

  {name:'Server Monitor',icon:'🛡️',status:'online',desc:'服务器健康监控，自动告警和修复建议',model:'GPT-4 · 温度 0.3'},

const sessions = [

  {title:'代码审查建议',agent:'Code Assistant',time:'15分钟前',status:'wr'},
  {title:'自动任务规划',agent:'Agent Planner',time:'1小时前',status:'ok'},

const workspaces = [
  {name:'Project Alpha',desc:'微服务架构，12 个 Agent 协同',progress:72},
  {name:'Project Beta',desc:'数据分析管道',progress:35}
];

const kowsledge = [
  {icon:'📄',name:'API 文档',count:156},
  {icon:'💡',name:'最佳实践',count:89},
  {icon:'🔧',name:'运维手册',count:42},
  {icon:'📊',name:'数据分析',count:67}
];

const remotes = [
  {icon:'💬',name:'企微远程控制',desc:'通过企微机器人控制 Agent',on:true},
  {icon:'📱',name:'飞书远程控制',desc:'通过飞书消息控制 Agent',on:true},
  {icon:'📲',name:'微信远程控制',desc:'通过公众号推送任务给 Agent',on:false}

const settings = [
  {icon:'🎨',name:'主题设置'},
  {icon:'⌨️',name:'快捷键配置'},
  {icon:'🌐',name:'网络设置'},
  {icon:'⚙️',name:'系统配置'}
];

// ===== PANEL CONTENT RENDERING =====
function renderPanelContent(page){
  const lpContent = document.getElementById('lpContent');
  if(!lpContent) return;
  let html = '<div class="section-title">AGENT</div>';
  agents.forEach(a => {
    html += `
      <div class="a-item ${a.status === 'busy' ? '' : (page === 'agents' ? 'active' : '')}" onclick="selectAgent(this)">
        <div class="a-icon">${a.icon}</div>
        <div class="a-info">
          <div class="a-name">${a.name}<span class="a-status ${a.status}">${a.status==='online'?'在线':a.status==='idle'?'空闲':'忙碌'}</span></div>
          <div class="a-desc">${a.desc}</div>
          <div class="a-model">${a.model}</div>
        </div>
      </div>`;
  });
  lpContent.innerHTML = html;
}

function renderSessionList(){
  const el = document.getElementById('sessionList');
  if(!el) return;
  let html = '';
  sessions.forEach((s,i) => {
    html += `
      <div class="s-item ${i===0?'active':''}" onclick="this.classList.toggle('active')">
        <div class="s-dot ${s.status}"></div>
        <div class="s-info">
          <div class="s-title">${s.title}</div>
          <div class="s-time">${s.time} · ${s.agent}</div>
        </div>
      </div>`;
  });
  el.innerHTML = html;
}

function renderWorkspace(){
  const el = document.getElementById('workspaceList');
  if(!el) return;
  let html = '';
  workspaces.forEach(w => {
    html += `
      <div class="ws-card">
        <div class="ws-name">${w.name}</div>
        <div class="ws-desc">${w.desc}</div>
        <div class="ws-bar"><div class="ws-fill" style="width:${w.progress}%"></div></div>
        <div class="ws-meta"><span>进度 ${w.progress}%</span><span>${Math.ceil(w.progress/10)} 任务</span></div>
      </div>`;
  });
  el.innerHTML = html;
}

function renderKnowledge(){
  const el = document.getElementById('knowledgeList');
  if(!el) return;
  let html = '';
  kowledge.forEach(k => {
    html += `
      <div class="k-item">
        <div class="k-icon">${k.icon}</div>
        <div class="k-name">${k.name}</div>
        <div class="k-count">${k.count} 文件</div>
      </div>`;
  });
  el.innerHTML = html;
}

function renderRemote(){
  const el = document.getElementById('remoteList');
  if(!el) return;
  let html = '';
  remotes.forEach(r => {
    html += `
      <div class="rm-card">
        <div class="rm-icon">${r.icon}</div>
        <div class="rm-info">
          <div class="rm-name">${r.name}</div>
          <div class="rm-desc">${r.desc}</div>
        </div>
        <div class="rm-switch ${r.on?'on':''}" onclick="this.classList.toggle('on')"></div>
      </div>`;
  });
  el.innerHTML = html;
}

function renderSettings(){
  const el = document.getElementById('settingsList');
  if(!el) return;
  let html = '';
  settings.forEach(s => {
    html += `
      <div class="k-item">
        <div class="k-icon">${s.icon}</div>
        <div class="k-name">${s.name}</div>
      </div>`;
  });
  el.innerHTML = html;
}

function renderAgentDetail(name){
  const el = document.getElementById('monitorBody');
  if(!el) return;
  const agent = agents.find(a => a.name === name) || agents[0];
  const isRunning = agent.status === 'online';
  
  el.innerHTML = `
    <div class="monitor-header">
      <div class="mh-icon">${agent.icon}</div>
      <div class="mh-info">
        <div class="mh-name">${agent.name} <span class="a-status ${agent.status}">${agent.status==='online'?'运行中':agent.status==='idle'?'空闲':'忙碌'}</span></div>
        <div class="mh-desc">${agent.desc}</div>
      </div>
      <div class="mh-status"><span class="dot ${isRunning?'ok':'wr'}"></span> ${isRunning?'运行中':'空闲'}</div>
    </div>
    
    <div class="timeline">
      <div class="timeline-title">📈 运行时间线</div>
      <div class="timeline-item">
        <div class="timeline-dot ok"></div>
        <div class="timeline-content">
          <div class="timeline-time">10:23</div>
          <div class="timeline-desc">接收任务：分析报告 /src/auth.py</div>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot ok"></div>
        <div class="timeline-content">
          <div class="timeline-time">10:24</div>
          <div class="timeline-desc">解析代码结构</div>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot ok"></div>
        <div class="timeline-content">
          <div class="timeline-time">10:25</div>
          <div class="timeline-desc">生成修复方案：优化认证逻辑</div>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot ac"></div>
        <div class="timeline-progress">
          <div class="timeline-time">10:26</div>
          <div class="timeline-desc">正在写代码</div>
          <div class="tp-bar"><div class="tp-fill" style="width:82%"></div></div>
          <div class="tp-label">进度 82%</div>
        </div>
      </div>
      <div class="timeline-item">
        <div class="timeline-dot wr"></div>
        <div class="timeline-content">
          <div class="timeline-time">等待中</div>
        </div>
      </div>
    </div>
    
    <div class="resource-grid">
      <div class="resource-card">
        <div class="rv ok">24%</div>
        <div class="rl">CPU</div>
      </div>
      <div class="resource-card">
        <div class="rv ac">120MB</div>
        <div class="rl">内存</div>
      </div>
      <div class="resource-card">
        <div class="rv ok">15MB</div>
        <div class="rl">磁盘 IO</div>
      </div>
    </div>
  `;
}

// ===== NAVIGATION =====
function switchPage(page){
  document.querySelectorAll('.inev-btn').forEach(b=>b.classList.remove('active'));
  event.target.closest('.inev-btn').classList.add('active');
  
  // Hide all content pages
  document.querySelectorAll('.content-page').forEach(p=>p.classList.remove('active'));
  const pageEl = document.getElementById('page-'+page);
  if(pageEl) pageEl.classList.add('active');
  
  // Update left panel
  const lpTitle = document.getElementById('lpTitle');
  const titles = {
    agents:'Agent 管理',sessions:'会话管理',monitor:'Agent 监控',
    workspace:'工作空间',knowledge:'知识库',remote:'远程控制',settings:'设置'
  };
  if(lpTitle) lpTitle.textContent = titles[page] || page;
  
  // Re-render list content
  renderPanelContent(page);
  
  switch(page){
    case 'sessions': renderSessionList(); break;
    case 'workspace': renderWorkspace(); break;
    case 'knowledge': renderKnowledge(); break;
    case 'remote': renderRemote(); break;
    case 'settings': renderSettings(); break;
    case 'monitor': renderAgentDetail('Code Assistant'); break;
    case 'agents': renderAgentDetail('Code Assistant'); break;
  }
}

function selectAgent(el){
  document.querySelectorAll('.a-item').forEach(a=>a.classList.remove('active'));
  el.classList.add('active');
  
  // Update agent detail
  const name = el.querySelector('.a-name').childNodes[0].textContent.trim();
  renderAgentDetail(name);
  
  // Switch to agent-detail page
  switchPage('agents');
}

function switchTab(btn, pageId){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  
  // Hide all pages, show target
  document.querySelectorAll('.content-page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId)?.classList.add('active');
}

function closeTab(closeEl){
  // Remove tab
  closeEl.parentElement.remove();
}

// ===== CHAT DRAWER =====
function minimizeChat(){
  const cd = document.getElementById('chatDrawer');
  cd.classList.remove('state-expanded','state-minimized');
  cd.classList.add('state-folded');
  cd.style.minWidth = '5px';
  document.getElementById('fabBtn').classList.remove('hidden');
  document.getElementById('globalSearchInput').value = '';
}

function toggleChatDrawer(){
  const cd = document.getElementById('chatDrawer');
  if(cd.classList.contains('state-folded') || cd.style.minWidth === '5px'){
    // expand to min
    cd.classList.remove('state-folded');
    cd.classList.add('state-minimized');
    cd.style.minWidth = '380px';
    document.getElementById('fabBtn').classList.add('hidden');
    document.getElementById('chatToggle').querySelector('.arrow').textContent = '◀';
  } else if(cd.classList.contains('state-minimized')){
    // expand to expanded
    cd.classList.remove('state-minimized');
    cd.classList.add('state-expanded');
    cd.style.minWidth = '50%';
    document.getElementById('chatToggle').querySelector('.arrow').textContent = '▶';
  } else {
    // collapse
    cd.classList.remove('state-expanded');
    cd.classList.add('state-folded');
    cd.style.minWidth = '5px';
    document.getElementById('fabBtn').classList.remove('hidden');
    document.getElementById('chatToggle').querySelector('.arrow').textContent = '▶';
  }
}

function maximizeChat(){
  const cd = document.getElementById('chatDrawer');
  cd.classList.remove('state-folded','state-minimized');
  cd.classList.add('state-expanded');
  cd.style.minWidth = '50%';
  document.getElementById('chatToggle').querySelector('.arrow').textContent = '▶';
}

// ===== CHAT DRAWER RESIZE =====
const chatResizeHandle = document.getElementById('chatResizeHandle');
let isChatResizing = false;

chatResizeHandle.addEventListener('pointerdown', (e) => {
  isChatResizing = true;
  chatResizeHandle.classList.add('dragging');
  e.preventDefault();
  document.body.style.cursor = 'col-resize';
});

document.addEventListener('pointermove', (e) => {
  if (!isChatResizing) return;
  const drawer = document.getElementById('chatDrawer');
  const ma = document.querySelector('.ma');
  const rect = ma.getBoundingClientRect();
  const x = e.clientX;
  const maxWidth = rect.width - 60;
  const minWidth = 200;
  const newWidth = maxWidth - x - rect.left;
  
  if (newWidth >= minWidth && newWidth <= maxWidth) {
    drawer.style.minWidth = newWidth + 'px';
  }
});

document.addEventListener('pointerup', () => {
  if (isChatResizing) {
    isChatResizing = false;
    chatResizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
  }
});

// ===== SPLIT HANDLE RESIZE =====
const mainSplitHandle = document.getElementById('mainSplitHandle');

mainSplitHandle.addEventListener('pointerdown', (e) => {
  isDragging = true;
  mainSplitHandle.classList.add('dragging');
  e.preventDefault();
});

document.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const container = document.getElementById('splitContainer');
  const leftPane = document.getElementById('leftPane');
  const rect = container.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.15, Math.min(0.85, ratio));
  
  leftPane.style.flex = `0 0 ${clamped * rect.width}px`;
});

document.addEventListener('pointerup', () => {
  if (isDragging) {
    isDragging = false;
    mainSplitHandle.classList.remove('dragging');
  }
});

// ===== GLOBAL SEARCH =====
function toggleGlobalSearch(){
  const gs = document.getElementById('globalSearch');
  gs.classList.toggle('active');
  if(gs.classList.contains('active')){
    gs.querySelector('.gs-input').focus();
  }
}

// ===== FLOAT CHAT =====
function toggleFloatChat(){
  const fc = document.getElementById('floatChat');
  fc.classList.toggle('show');
}

// ===== SEND CHAT MESSAGE =====
function sendChat(){
  const input = document.getElementById('chatInput');
  if(!input.value.trim()) return;
  
  const body = document.getElementById('chatBody');
  const newMsg = document.createElement('div');
  newMsg.className = 'dd-msg user';
  newMsg.innerHTML = `
    <div class="dd-av">🧑</div>
    <div class="dd-bubble">${input.value}</div>
  `;
  body.appendChild(newMsg);
  
  // Auto scroll
  body.scrollTop = body.scrollHeight;
  
  // Simulate reply
  setTimeout(()=>{
    const reply = document.createElement('div');
    reply.className = 'dd-msg ai';
    reply.innerHTML = `
      <div class="dd-av">🤖</div>
      <div class="dd-bubble">收到！让我来处理这个问题...</div>
    `;
    body.appendChild(reply);
    body.scrollTop = body.scrollHeight;
  }, 500);
  
  input.value = '';
}

function handleChatKey(e){
  if(e.key === 'Enter') sendChat();
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', (e) => {
  // ⌘+K or Ctrl+K → Global Search
  if((e.metaKey || e.ctrlKey) && e.key === 'k'){
    e.preventDefault();
    toggleGlobalSearch();
  }
  // ⌘+Shift+K or Ctrl+Shift+K → Toggle Chat Drawer
  if((e.metaKey || e.ctrlKey) && e.shiftKey && e.key === 'K'){
    e.preventDefault();
    toggleChatDrawer();
  }
  // Escape
  if(e.key === 'Escape'){
    document.getElementById('globalSearch')?.classList.remove('active');
  }
});

// ===== TIME =====
function updateTime(){
  const now = new Date();
  document.getElementById('tbTime').textContent = now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}
setInterval(updateTime,1000);
updateTime();

</script>
</body>
</html>
